<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音直播提取器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/flv.js/1.6.2/flv.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/hls.js/1.4.0/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <div class="card login-card">
                <h1>登录</h1>
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码">
                </div>
                <button id="login-btn" class="btn primary">登录</button>
                <div id="login-error" class="error-msg"></div>
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen hidden">
            <header>
                <div class="logo">抖音直播</div>
                <button id="logout-btn" class="btn text">退出登录</button>
            </header>

            <main>
                <div class="search-section">
                    <div class="input-wrapper">
                        <input type="text" id="url-input" placeholder="粘贴抖音直播链接、房间号或直链 (.flv/.m3u8)">
                        <div id="history-dropdown" class="history-dropdown hidden">
                            <!-- History items injected here -->
                        </div>
                    </div>
                    <button id="extract-btn" class="btn primary">解析</button>
                </div>

                <div id="info-section" class="card hidden">
                    <div class="stream-info">
                        <img id="cover-img" src="" alt="Cover">
                        <div class="details">
                            <h2 id="room-title">加载中...</h2>
                            <p id="anchor-name">主播</p>
                            <span id="room-status" class="status-badge">直播中</span>
                        </div>
                    </div>
                </div>

                <div id="quality-section" class="card hidden">
                    <h3>选择清晰度</h3>
                    <div id="quality-buttons" class="button-grid">
                        <!-- Quality buttons injected here -->
                    </div>
                </div>

                <div id="player-container" class="card hidden">
                    <video id="video-player" controls></video>
                    <div class="controls-bar">
                        <div class="playback-controls">
                            <button id="reload-btn" class="btn sm">重新加载</button>
                            <button id="forward-btn" class="btn sm">同步直播</button>
                            <button id="fullscreen-btn" class="btn sm">全屏</button>
                        </div>
                        <div class="speed-controls">
                            <label>画质：</label>
                            <select id="quality-select">
                                <option value="" disabled selected>自动</option>
                            </select>
                            <label class="checkbox-label">
                                <input type="checkbox" id="auto-latency-toggle" checked> 自动同步
                            </label>
                            <label>倍速：</label>
                            <select id="speed-select">
                                <option value="0.5">0.5x</option>
                                <option value="1.0" selected>1.0x</option>
                                <option value="1.25">1.25x</option>
                                <option value="1.5">1.5x</option>
                                <option value="2.0">2.0x</option>
                            </select>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
